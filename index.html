<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DailyFlow</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- PUBLIC LANDING PAGE -->
  <section class="hero">

    <div class="overlay"></div>

    <nav>
      <h1 class="logo">DailyFlow</h1>
    </nav>

    <div class="hero-content fade-up">

      <h2>
        Your Daily Story Starts Here
      </h2>

      <p>
        Organize your day, track your tasks,
        and stay consistent.
      </p>

      <!-- TASK BOX -->
      <div class="task-box glass">

        <h3>Today's Tasks</h3>

        <div class="task-input-area">

          <input
          type="text"
          id="taskInput"
          placeholder="Add your task..."
          >

          <button id="addTaskBtn">
            Add
          </button>

        </div>

        <ul id="taskList"></ul>

      </div>

    </div>

    <!-- SECRET ACCESS -->
    <div id="hiddenPortal"></div>

  </section>


  <!-- PRIVATE DIARY -->
  <section
  id="privateSection"
  class="private-section hidden">

    <div class="private-overlay"></div>

    <div class="private-container fade-up">

      <div class="top-bar">

        <h2>Private Diary</h2>

        <button id="logoutBtn">
          Logout
        </button>

      </div>

      <!-- DIARY ENTRY -->
      <div class="diary-entry-box">

        <input
        type="text"
        id="diaryTitle"
        placeholder="Diary Title"
        >

        <textarea
        id="diaryText"
        placeholder="Write your thoughts..."
        ></textarea>

        <button id="saveDiaryBtn">
          Save Entry
        </button>

      </div>

      <!-- SAVED ENTRIES -->
      <div class="saved-entries">

        <h3>Your Entries</h3>

        <div id="entriesContainer"></div>

      </div>

    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
